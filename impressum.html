<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum - Portfolio</title>
    <style>
        /* --- BASIC RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Using the same background for consistency */
            background-image: url('retroback.gif'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            image-rendering: pixelated;
            
            font-family: "MS Sans Serif", "Tahoma", "Verdana", sans-serif;
            min-height: 100vh;
            padding-bottom: 50px; 
            text-align: center;
        }

        /* --- WINDOWS 95 WINDOW DESIGN --- */
        .win95-window {
            width: 80%;
            max-width: 600px; 
            margin: 50px auto;
            background-color: #c0c0c0; 
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-bottom: 2px solid #000000;
            border-right: 2px solid #000000;
            box-shadow: inset -1px -1px #808080, inset 1px 1px #dfdfdf;
            padding: 2px;
            color: black;
            text-align: left; 
        }

        .win95-titlebar {
            background-color: #000080; 
            color: white;
            padding: 2px 4px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between; 
            align-items: center;
        }

        .win95-close-btn {
            background-color: #c0c0c0;
            color: black;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-bottom: 1px solid #000000;
            border-right: 1px solid #000000;
            font-weight: bold;
            font-size: 12px;
            padding: 0 4px;
            cursor: pointer;
            text-decoration: none; /* For using it as a link back home */
        }

        .win95-close-btn:active {
            border-top: 1px solid #000000;
            border-left: 1px solid #000000;
            border-bottom: 1px solid #ffffff;
            border-right: 1px solid #ffffff;
        }

        .win95-content {
            padding: 15px;
        }

        .win95-content h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: black; 
        }

        .win95-content h2 {
            font-size: 16px;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        
        .win95-content p {
            line-height: 1.5;
            margin-bottom: 10px;
            font-size: 14px;
        }

        /* Navigation link inside the window */
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <!-- Main Legal Window -->
    <div class="win95-window">
        <div class="win95-titlebar">
            <span>Impressum.txt</span>
            <!-- Close button links back to the main page -->
            <a href="index.html" class="win95-close-btn">X</a>
        </div>
        
        <div class="win95-content">
            <a href="index.html" class="back-link">&lt;&lt; Zurück zur Startseite</a>
            
            <h1>Impressum</h1>
            
            <h2>Angaben gemäß § 5 TMG</h2>
            <p>
                Mads Flemming<br>
                Eichendorffstraße 17<br>
                24116 Kiel<br>
            </p>

            <h2>Kontakt</h2>
            <p>
                E-Mail: impressum@mads.at
            </p>

            <h2>Verantwortlich für den Inhalt nach § 55 Abs. 2 RStV</h2>
            <p>
                Mads Flemming<br>
                Eichendorffstraße 17<br>
                24116 Kiel<br>
            </p>
        </div>
    </div>

</body>
</html>
