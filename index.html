<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Y2K Website</title>
    <style>
        /* --- BASIC RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('retroback.gif'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            image-rendering: pixelated;
            
            /* Default font for the body */
            font-family: "MS Sans Serif", "Tahoma", "Verdana", sans-serif;
            min-height: 100vh;
            
            /* Padding to prevent elements from touching the bottom edge */
            padding-bottom: 50px; 
            text-align: center;
        }

        /* --- WINDOWS 95 WINDOW DESIGN --- */
        
        .win95-window {
            width: 80%;
            max-width: 600px; /* Slightly narrower for an authentic look */
            margin: 50px auto;
            background-color: #c0c0c0; /* Classic Windows gray */
            
            /* 3D border effect */
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-bottom: 2px solid #000000;
            border-right: 2px solid #000000;
            box-shadow: inset -1px -1px #808080, inset 1px 1px #dfdfdf;
            
            padding: 2px;
            color: black;
            text-align: left; /* Windows UI text is left-aligned */
        }

        .win95-titlebar {
            background-color: #000080; /* Classic dark Windows blue */
            color: white;
            padding: 2px 4px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between; /* Separates title text and close button */
            align-items: center;
        }

        .win95-close-btn {
            background-color: #c0c0c0;
            color: black;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-bottom: 1px solid #000000;
            border-right: 1px solid #000000;
            font-weight: bold;
            font-size: 12px;
            padding: 0 4px;
            cursor: pointer;
        }

        .win95-close-btn:active {
            /* Pushed-in effect when clicking the close button */
            border-top: 1px solid #000000;
            border-left: 1px solid #000000;
            border-bottom: 1px solid #ffffff;
            border-right: 1px solid #ffffff;
        }

        .win95-content {
            padding: 15px;
        }

        .win95-content h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: black; 
        }
        
        .win95-content p {
            line-height: 1.5;
            margin-bottom: 10px;
        }

        /* --- DESKTOP ICONS --- */
        
        .desktop-icons-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 40px; /* Space between the desktop icons */
        }

        .desktop-icon {
            display: flex;
            flex-direction: column; /* Stacks image and text vertically */
            align-items: center;
            text-decoration: none; /* Removes the underline from the link */
            cursor: pointer;
        }
        
        .desktop-icon img {
            border: none; /* Prevents blue borders on image links in old browsers */
            margin-bottom: 5px; /* Space between icon and label */
        }

        .icon-label {
            color: white;
            font-size: 12px;
            /* Black pixel-shadow to ensure readability against colorful backgrounds */
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }
        
        /* Optional: Classic blue highlight when hovering over the icon */
        .desktop-icon:hover .icon-label {
            background-color: #000080; /* Windows blue */
            text-shadow: none; /* Removes shadow when highlighted */
        }


        /* --- FOOTER LINKS (LEGAL) --- */
        .footer-links {
            margin-top: 60px; /* Abstand zu den Icons */
            padding-bottom: 20px;
            font-size: 12px;
        }

        .footer-links a {
            color: white;
            text-decoration: none; /* Entfernt den Standard-Unterstrich */
            margin: 0 10px;
        }

        .footer-links a:hover {
            text-decoration: underline; /* Unterstrich nur, wenn man mit der Maus drüberfährt */
        }
    </style>
</head>
<body>

    <!-- Main Windows 95 Container -->
    <div class="win95-window">
        <div class="win95-titlebar">
            <span>Moin.exe</span>
            <button class="win95-close-btn">X</button>
        </div>
        <div class="win95-content">
    <h1>Welcome to my Homepage!</h1>
    <p>You've reached my digital portfolio. I use this space to archive my latest projects and code.</p>
    <p><i>Pardon the digital dust – this site is heavily under construction. Please excuse any missing pixels!</i></p>
</div>
    </div>

    <!-- Extra image mentioned in your previous code -->
    <img src="construct.gif" alt="Construction GIF" style="margin-bottom: 20px;">

    <!-- Desktop Icons (Rotating GIFs) -->
    <div class="desktop-icons-container">
        <!-- Email Icon -->
        <a href="mailto:deine.adresse@email.de" class="desktop-icon">
            <img src="email.gif" alt="Email Icon">
            <span class="icon-label">Email</span>
        </a>
        
        <!-- GitHub / CD Icon -->
        <a href="https://github.com/MadsFl" class="desktop-icon">
            <img src="macd.gif" alt="GitHub CD Icon">
            <span class="icon-label">GitHub</span>
        </a>
    </div>

    <!-- Footer / Legal Links -->
    <div class="footer-links">
        <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a>
    </div>
</body>
</html>
